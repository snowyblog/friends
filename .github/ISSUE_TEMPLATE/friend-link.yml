name: 友链申请
description: 提交你的博客加入友链
title: "[友链申请] 你的博客名称"
labels: ["友链申请"]
body:
  - type: input
    id: name
    attributes:
      label: 博客名称
      placeholder: "我的博客"
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: 博客网址
      placeholder: "https://example.com"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 博客简介
      placeholder: "一句话介绍你的博客"
    validations:
      required: true

  - type: input
    id: icon
    attributes:
      label: 图标 URL
      placeholder: "https://example.com/avatar.png"
      description: 正方形图片为佳，将裁剪为圆形展示
    validations:
      required: true
