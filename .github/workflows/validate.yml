name: PR 格式校验

on:
  pull_request:
    paths:
      - "links/**/*.yaml"
      - "links/**/*.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install yaml

      - name: 校验 YAML 文件格式
        uses: actions/github-script@v7
        with:
          script: |
            const { readFileSync, readdirSync } = require("node:fs");
            const { join } = require("node:path");
            const { parse } = require("yaml");

            const linksDir = join(process.env.GITHUB_WORKSPACE, "links");
            const files = readdirSync(linksDir).filter(
              (f) => f.endsWith(".yaml") || f.endsWith(".yml")
            );

            if (files.length === 0) {
              core.setFailed("links/ 目录下没有找到 YAML 文件");
              return;
            }

            const errors = [];
            const seenUrls = new Set();

            for (const file of files) {
              const filePath = join(linksDir, file);
              let content;
              try {
                content = readFileSync(filePath, "utf-8");
              } catch {
                errors.push(`${file}: 无法读取文件`);
                continue;
              }

              let data;
              try {
                data = parse(content);
              } catch (e) {
                errors.push(`${file}: YAML 解析失败 — ${e.message}`);
                continue;
              }

              if (!data || typeof data !== "object") {
                errors.push(`${file}: 文件内容为空或格式错误`);
                continue;
              }

              if (!data.name || typeof data.name !== "string") {
                errors.push(`${file}: 缺少必填字段 "name"`);
              }
              if (!data.description || typeof data.description !== "string") {
                errors.push(`${file}: 缺少必填字段 "description"`);
              }
              if (!data.url || typeof data.url !== "string") {
                errors.push(`${file}: 缺少必填字段 "url"`);
              } else {
                try {
                  new URL(data.url);
                } catch {
                  errors.push(`${file}: url 格式不合法`);
                }
                if (seenUrls.has(data.url)) {
                  errors.push(`${file}: url 重复`);
                }
                seenUrls.add(data.url);
              }
              if (!data.icon || typeof data.icon !== "string") {
                errors.push(`${file}: 缺少必填字段 "icon"`);
              } else {
                try {
                  new URL(data.icon);
                } catch {
                  errors.push(`${file}: icon 格式不合法`);
                }
              }
            }

            if (errors.length > 0) {
              core.setFailed("校验失败：\n" + errors.join("\n"));
            } else {
              console.log(`校验通过！共 ${files.length} 个友链文件`);
            }
