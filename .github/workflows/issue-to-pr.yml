name: Issue 转 PR

on:
  issues:
    types: [opened]

jobs:
  parse-and-pr:
    if: contains(github.event.issue.body, '### 博客名称')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: npm install yaml

      - name: 解析表单 + 校验 + 检测 URL 可达性
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require("child_process");
            const fs = require("fs");
            const path = require("path");
            const yaml = require("yaml");

            // GitHub Issue body 使用 \r\n 换行，先统一为 \n
            const body = context.payload.issue.body.replace(/\r\n/g, "\n");
            const errors = [];

            // 按 "### " 分段解析表单字段
            function extractField(title) {
              const regex = new RegExp(`### ${title}\\s*\\n+([\\s\\S]*?)(?=\\n###|$)`, "i");
              const match = body.match(regex);
              if (match && match[1]) {
                return match[1].trim();
              }
              return "";
            }

            const name = extractField("博客名称");
            const url = extractField("博客网址");
            const description = extractField("博客简介");
            const icon = extractField("图标 URL");

            if (!name) errors.push("博客名称 不能为空");
            if (!description) errors.push("博客简介 不能为空");

            if (!url) {
              errors.push("博客网址 不能为空");
            } else {
              try {
                new URL(url);
              } catch {
                errors.push("网址格式不合法: " + url);
              }
            }

            if (!icon) {
              errors.push("图标 URL 不能为空");
            } else {
              try {
                new URL(icon);
              } catch {
                errors.push("图标 URL 格式不合法: " + icon);
              }
            }

            // 检查重复
            const safeFileName = name.replace(/[^a-zA-Z0-9\u4e00-\u9fff_-]/g, "-").replace(/-+/g, "-").replace(/^-|-$/g, "") || "unknown";
            const linksDir = path.join(process.env.GITHUB_WORKSPACE, "links");
            const existingFiles = fs.readdirSync(linksDir).filter(f => f.endsWith(".yaml") || f.endsWith(".yml"));
            for (const file of existingFiles) {
              const content = fs.readFileSync(path.join(linksDir, file), "utf-8");
              try {
                const data = yaml.parse(content);
                if (data && data.url === url) {
                  errors.push("该网址已在 " + file + " 中提交过，请勿重复申请");
                }
              } catch {}
            }

            // URL 可达性检测（跳过校验失败的才检测）
            if (!errors.some(e => e.includes("网址"))) {
              try {
                execSync('curl -sS -o /dev/null -w "%{http_code}" --max-time 15 -L "' + url + '"', { encoding: "utf-8" });
              } catch (e) {
                errors.push("网址无法访问: " + url + "（请确认博客是否正常运行）");
              }
            }

            // 图标 URL 可达性检测
            if (!errors.some(e => e.includes("图标"))) {
              try {
                execSync('curl -sS -o /dev/null -w "%{http_code}" --max-time 15 -L "' + icon + '"', { encoding: "utf-8" });
              } catch (e) {
                errors.push("图标无法访问: " + icon + "（请确认图标 URL 是否有效）");
              }
            }

            core.setOutput("name", name);
            core.setOutput("url", url);
            core.setOutput("description", description);
            core.setOutput("icon", icon);
            core.setOutput("safeFileName", safeFileName);
            core.setOutput("errors", JSON.stringify(errors));
            core.setOutput("has_errors", errors.length > 0 ? "true" : "false");

      - name: 校验失败 — 关闭 Issue 并回复
        if: steps.parse.outputs.has_errors == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const errors = JSON.parse(process.env.ERRORS);
            const body = [
              "## 校验未通过",
              "",
              ...errors.map(e => "- " + e),
              "",
              "请修正后重新提交一个新的 Issue。",
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed",
            });
        env:
          ERRORS: ${{ steps.parse.outputs.errors }}

      - name: 校验通过 — 创建 PR
        if: steps.parse.outputs.has_errors == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = require("path");
            const yaml = require("yaml");
            const { execSync } = require("child_process");

            const name = process.env.NAME;
            const url = process.env.URL;
            const description = process.env.DESC;
            const icon = process.env.ICON;
            const safeFileName = process.env.SAFE_FILE;

            let finalName = safeFileName;
            let counter = 1;
            while (fs.existsSync(path.join(process.env.GITHUB_WORKSPACE, "links", finalName + ".yaml"))) {
              finalName = safeFileName + "-" + counter;
              counter++;
            }

            const yamlContent = yaml.stringify({ name, description, url, icon });
            fs.writeFileSync(path.join(process.env.GITHUB_WORKSPACE, "links", finalName + ".yaml"), yamlContent, "utf-8");

            const branchName = "friend-link/" + finalName + "-" + Date.now();
            execSync("git config user.name 'github-actions[bot]'");
            execSync("git config user.email 'github-actions[bot]@users.noreply.github.com'");
            execSync("git checkout -b " + branchName);
            execSync("git add links/" + finalName + ".yaml");
            execSync('git commit -m "add friend link: ' + name.replace(/"/g, '\\"') + '"');
            execSync("git push origin " + branchName);

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "添加友链：" + name,
              head: branchName,
              base: "main",
              body: [
                "来自 #" + context.issue.number + " 的友链申请",
                "",
                "| 字段 | 内容 |",
                "|------|------|",
                "| 博客名称 | " + name + " |",
                "| 网址 | " + url + " |",
                "| 简介 | " + description + " |",
                "| 图标 | ![](" + icon + ") |",
              ].join("\n"),
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "校验通过，已自动创建 PR：" + pr.data.html_url + "\n\n请等待人工审核合入。",
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed",
            });
        env:
          NAME: ${{ steps.parse.outputs.name }}
          URL: ${{ steps.parse.outputs.url }}
          DESC: ${{ steps.parse.outputs.description }}
          ICON: ${{ steps.parse.outputs.icon }}
          SAFE_FILE: ${{ steps.parse.outputs.safeFileName }}
